name: Daily Academic Radar

on:
  schedule:
    - cron: '0 2 * * *'  # 10:00 AM Beijing time (UTC+8)
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily report
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python daily_ai_brief.py

      - name: Prepare GitHub Pages output
        run: |
          mkdir -p _site
          cp reports/daily_brief_*.html _site/ 2>/dev/null || true
          # Create index.html that redirects to latest report
          LATEST=$(ls -t reports/daily_brief_*.html 2>/dev/null | head -1)
          if [ -n "$LATEST" ]; then
            cp "$LATEST" _site/index.html
          else
            echo "<html><body><h1>No reports yet</h1></body></html>" > _site/index.html
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Commit updated reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "chore: update daily report $(date +%Y-%m-%d)"
          git push origin gh-pages

  deploy:
    needs: generate-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
